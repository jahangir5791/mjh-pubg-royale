<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - MJH PUBG Royale</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            font-size: 1.3em;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .btn {
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 8px 25px rgba(78,205,196,0.4);
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(78,205,196,0.6);
        }
        .features {
            margin-top: 40px;
            opacity: 0.8;
            font-size: 0.9em;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #4ecdc4;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ PUBG Royale</h1>
        <div class="spinner"></div>
        <div class="status">You're offline</div>
        <p>Connect to internet to play multiplayer battle royale!</p>
        
        <button class="btn" onclick="window.location.reload()">
            🔄 Retry Connection
        </button>
        
        <div class="features">
            <p>✅ App cached - fast reload<br>
            ✅ Installable PWA<br>
            ✅ Ready for multiplayer</p>
        </div>
    </div>
    
    <script>
        // Auto retry when online
        window.addEventListener('online', () => {
            window.location.reload();
        });
        
        // Check connection
        if (navigator.onLine) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
