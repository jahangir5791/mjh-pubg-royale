<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MJH PUBG Royale - 3D Battle Royale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Arial', sans-serif; }
    
    /* বাটন বার - নিচের দিকে সেন্টার করা */
    .button-bar {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 12px 20px;
      display: flex;
      gap: 15px;
      z-index: 200;
      border: 1px solid rgba(0,255,255,0.3);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    .button-bar button {
      background: linear-gradient(45deg, #ff6b6b, #feca57);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.2s;
    }
    
    .button-bar button:hover { transform: scale(1.05); }
    
    #howToPlayBtn {
      background: linear-gradient(45deg, #4ecdc4, #44a08d) !important;
    }
    
    /* জয়েন মডাল */
    .join-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      z-index: 300;
      border: 2px solid #ff6b6b;
      min-width: 280px;
      display: none;
    }
    
    .join-modal input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
    }
    
    .join-modal button {
      padding: 8px 20px;
      margin: 5px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }
    
    #confirmJoin { background: #ff6b6b; color: white; }
    #cancelJoin { background: #555; color: white; }
    
    /* গেম প্যানেল (রুম ইনফো) */
    .game-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 12px;
      z-index: 200;
      min-width: 180px;
      font-size: 12px;
      color: white;
      display: none;
    }
    
    .game-panel .room-code {
      background: #ff6b6b;
      padding: 3px 8px;
      border-radius: 8px;
      font-weight: bold;
    }
    
    .players-list {
      margin-top: 8px;
      max-height: 100px;
      overflow-y: auto;
    }
    
    .player-item {
      padding: 3px;
      margin: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 5px;
    }
    
    #status {
      position: fixed;
      bottom: 100px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      padding: 8px;
      border-radius: 10px;
      text-align: center;
      font-size: 11px;
      z-index: 100;
    }
    
    .hidden { display: none !important; }
    .connected { color: #0f0; }
    .connecting { color: #ff0; }
    .disconnected { color: #f00; }
    
    @media (max-width: 600px) {
      .button-bar { padding: 8px 12px; gap: 8px; }
      .button-bar button { padding: 6px 12px; font-size: 11px; }
      .game-panel { top: 10px; right: 10px; min-width: 150px; }
    }
  </style>
</head>
<body>
  <!-- বাটন বার -->
  <div class="button-bar">
    <button id="quickPlayBtn">🎮 Quick Play</button>
    <button id="createRoomBtn">🏠 Create Room</button>
    <button id="joinRoomBtn">👥 Join Room</button>
    <button id="howToPlayBtn">📖 How to Play</button>
  </div>
  
  <!-- জয়েন মডাল -->
  <div id="joinModal" class="join-modal">
    <h3 style="color:#ff6b6b; margin-bottom:15px;">🔗 Join Room</h3>
    <input type="text" id="roomCode" placeholder="Room Code (MJHXXXX)">
    <input type="text" id="playerName" placeholder="Your Name">
    <button id="confirmJoin">Join</button>
    <button id="cancelJoin">Cancel</button>
  </div>
  
  <!-- গেম প্যানেল -->
  <div id="gamePanel" class="game-panel">
    <div>🏠 Room: <span id="roomCodeDisplay" class="room-code"></span></div>
    <div>👥 Players: <span id="playerCount"></span>/10</div>
    <div class="players-list" id="playersList"></div>
    <button id="readyBtn" style="background:#4ecdc4; margin-top:8px; padding:4px 10px;">✅ Ready</button>
    <button id="leaveBtn" style="background:#ff6b6b; margin-top:4px; padding:4px 10px;">🚪 Leave</button>
    <div id="gameStatus" style="margin-top:6px; font-size:10px; color:#ffaa00;"></div>
  </div>
  
  <div id="status">🔌 Connecting to server...</div>
  
  <!-- How to Play মডাল -->
  <div id="howToPlayModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:400; justify-content:center; align-items:center;">
    <div style="background:#1a1a2e; border-radius:20px; padding:25px; max-width:320px; color:white;">
      <h2 style="color:#ff6b6b;">🎮 How to Play</h2>
      <p><strong>Quick Play:</strong> একা খেলা শুরু</p>
      <p><strong>Create Room:</strong> রুম তৈরি করুন</p>
      <p><strong>Join Room:</strong> রুম কোড দিয়ে যোগ দিন</p>
      <p><strong>Controls:</strong> WASD বা Arrow Keys</p>
      <p><strong>Goal:</strong> শেষ পর্যন্ত বেঁচে থাকুন!</p>
      <button id="closeModalBtn" style="background:#ff6b6b; padding:10px 20px; border:none; border-radius:25px; margin-top:15px; width:100%; color:white;">Got it 🔥</button>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    
    let ws = null;
    let playerId = null;
    let currentRoom = null;
    let isReady = false;
    let gameStarted = false;
    
    // ============= 3D সেটআপ =============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // আকাশী নীল
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.01);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 12);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    
    // গ্রাউন্ড
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(60, 60),
      new THREE.MeshStandardMaterial({ color: 0x5c9e3e, roughness: 0.8 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // গ্রিড
    const grid = new THREE.GridHelper(60, 20, 0x4ecdc4, 0x2c5f2d);
    grid.position.y = -0.9;
    scene.add(grid);
    
    // লাইট
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(10, 20, 5);
    dirLight.castShadow = true;
    scene.add(dirLight);
    
    // কার্টুন প্লেয়ার তৈরি
    function createPlayer(color = 0xff6b6b, isLocal = false) {
      const group = new THREE.Group();
      
      // শরীর
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.4, 1.0, 8),
        new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 })
      );
      body.position.y = 0.5;
      body.castShadow = true;
      group.add(body);
      
      // মাথা
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.45, 32, 32),
        new THREE.MeshStandardMaterial({ color: 0xffdd99 })
      );
      head.position.y = 1.05;
      head.castShadow = true;
      group.add(head);
      
      // চোখ
      const eyeWhite = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      const leftEye = eyeWhite.clone();
      leftEye.position.set(-0.18, 1.18, 0.45);
      group.add(leftEye);
      const rightEye = eyeWhite.clone();
      rightEye.position.set(0.18, 1.18, 0.45);
      group.add(rightEye);
      
      // পিউপিল
      const pupil = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0x000000 })
      );
      const leftPupil = pupil.clone();
      leftPupil.position.set(-0.18, 1.17, 0.55);
      group.add(leftPupil);
      const rightPupil = pupil.clone();
      rightPupil.position.set(0.18, 1.17, 0.55);
      group.add(rightPupil);
      
      // ক্যাপ
      const cap = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.55, 0.15, 8),
        new THREE.MeshStandardMaterial({ color: color })
      );
      cap.position.y = 1.38;
      group.add(cap);
      
      return group;
    }
    
    let localPlayer = createPlayer(0xff6b6b, true);
    scene.add(localPlayer);
    localPlayer.position.set(0, -0.5, 0);
    
    const otherPlayers = new Map();
    
    // গাছ
    for (let i = 0; i < 40; i++) {
      const tree = new THREE.Group();
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.4, 0.8, 6),
        new THREE.MeshStandardMaterial({ color: 0x8B5A2B })
      );
      trunk.position.y = 0.4;
      tree.add(trunk);
      const foliage = new THREE.Mesh(
        new THREE.ConeGeometry(0.5, 0.7, 6),
        new THREE.MeshStandardMaterial({ color: 0x4caf50 })
      );
      foliage.position.y = 0.85;
      tree.add(foliage);
      
      const angle = Math.random() * Math.PI * 2;
      const radius = 15 + Math.random() * 25;
      tree.position.x = Math.cos(angle) * radius;
      tree.position.z = Math.sin(angle) * radius;
      scene.add(tree);
    }
    
    // ফুল
    for (let i = 0; i < 150; i++) {
      const flower = new THREE.Group();
      const stem = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.05, 0.25, 4),
        new THREE.MeshStandardMaterial({ color: 0x4caf50 })
      );
      stem.position.y = 0.12;
      flower.add(stem);
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 8, 8),
        new THREE.MeshStandardMaterial({ color: [0xff6b6b, 0xffcc5c, 0xff6f69, 0x88d8b0][Math.floor(Math.random() * 4)] })
      );
      head.position.y = 0.25;
      flower.add(head);
      
      const x = (Math.random() - 0.5) * 50;
      const z = (Math.random() - 0.5) * 50;
      if (Math.abs(x) < 24 && Math.abs(z) < 24) {
        flower.position.set(x, -0.85, z);
        scene.add(flower);
      }
    }
    
    // ক্যামেরা ফলো
    function updateCamera() {
      if (gameStarted && localPlayer) {
        const targetPos = localPlayer.position.clone();
        camera.position.lerp(targetPos.clone().add(new THREE.Vector3(0, 3, 8)), 0.1);
        camera.lookAt(targetPos);
      }
    }
    
    // মুভমেন্ট
    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
    
    let lastPos = { x: 0, z: 0 };
    function handleMovement() {
      if (!gameStarted || !localPlayer) return;
      
      let dx = 0, dz = 0;
      if (keys['w'] || keys['arrowup']) dz -= 0.2;
      if (keys['s'] || keys['arrowdown']) dz += 0.2;
      if (keys['a'] || keys['arrowleft']) dx -= 0.2;
      if (keys['d'] || keys['arrowright']) dx += 0.2;
      
      if (dx !== 0 || dz !== 0) {
        localPlayer.position.x += dx;
        localPlayer.position.z += dz;
        localPlayer.position.x = Math.max(-25, Math.min(25, localPlayer.position.x));
        localPlayer.position.z = Math.max(-25, Math.min(25, localPlayer.position.z));
        
        const angle = Math.atan2(dx, dz);
        localPlayer.rotation.y = angle;
        
        if (ws && ws.readyState === WebSocket.OPEN) {
          const pos = { x: localPlayer.position.x, y: 0, z: localPlayer.position.z };
          if (Math.hypot(pos.x - lastPos.x, pos.z - lastPos.z) > 0.3) {
            ws.send(JSON.stringify({ type: 'update_position', position: pos }));
            lastPos = { x: pos.x, z: pos.z };
          }
        }
      }
    }
    
    // UI এলিমেন্ট
    const statusDiv = document.getElementById('status');
    const gamePanel = document.getElementById('gamePanel');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const playersListDiv = document.getElementById('playersList');
    const playerCountSpan = document.getElementById('playerCount');
    const readyBtn = document.getElementById('readyBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const gameStatusDiv = document.getElementById('gameStatus');
    const joinModal = document.getElementById('joinModal');
    
    // WebSocket সংযোগ
    function connectWebSocket() {
      const wsUrl = 'wss://mjh-pubg-server.onrender.com';
      statusDiv.textContent = '🔌 Connecting to Render server...';
      statusDiv.className = 'connecting';
      
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        statusDiv.textContent = '✅ Connected! Ready to battle!';
        statusDiv.className = 'connected';
      };
      
      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          handleMessage(data);
        } catch(e) { console.error(e); }
      };
      
      ws.onerror = () => {
        statusDiv.textContent = '❌ Connection error!';
        statusDiv.className = 'disconnected';
      };
      
      ws.onclose = () => {
        statusDiv.textContent = '🔌 Disconnected. Refresh to reconnect.';
        statusDiv.className = 'disconnected';
      };
    }
    
    function handleMessage(data) {
      console.log('Message:', data.type);
      switch(data.type) {
        case 'connected':
          playerId = data.playerId;
          break;
        case 'room_created':
        case 'room_joined':
          currentRoom = data.roomCode;
          roomCodeDisplay.textContent = data.roomCode;
          updatePlayers(data.players);
          gamePanel.style.display = 'block';
          statusDiv.textContent = `🎯 Room: ${data.roomCode}`;
          break;
        case 'player_joined':
        case 'player_left':
        case 'player_ready_update':
          if (data.players) updatePlayers(data.players);
          break;
        case 'game_start':
          gameStarted = true;
          gameStatusDiv.textContent = '🎮 GAME STARTED! Use WASD/Arrows';
          localPlayer.position.set((Math.random() - 0.5) * 30, -0.5, (Math.random() - 0.5) * 30);
          break;
        case 'player_moved':
          if (data.playerId !== playerId && data.position) {
            let p = otherPlayers.get(data.playerId);
            if (!p) {
              p = createPlayer(0x4ecdc4, false);
              scene.add(p);
              otherPlayers.set(data.playerId, p);
            }
            p.position.set(data.position.x, -0.5, data.position.z);
          }
          break;
        case 'error':
          statusDiv.textContent = `⚠️ ${data.message}`;
          break;
      }
    }
    
    function updatePlayers(players) {
      playerCountSpan.textContent = players.length;
      playersListDiv.innerHTML = players.map(p => `<div class="player-item">${p.name} ${p.isHost ? '👑' : ''} ${p.ready ? '✅' : '⏳'}</div>`).join('');
    }
    
    // বাটন ইভেন্ট
    document.getElementById('quickPlayBtn').onclick = () => {
      if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'quick_play' }));
        statusDiv.textContent = '🔍 Searching for match...';
      } else { statusDiv.textContent = '❌ Not connected!'; }
    };
    
    document.getElementById('createRoomBtn').onclick = () => {
      if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'create_room', roomName: 'MJH Battle' }));
        statusDiv.textContent = '🏠 Creating room...';
      } else { statusDiv.textContent = '❌ Not connected!'; }
    };
    
    document.getElementById('joinRoomBtn').onclick = () => {
      joinModal.style.display = 'block';
    };
    
    document.getElementById('confirmJoin').onclick = () => {
      const code = document.getElementById('roomCode').value.trim().toUpperCase();
      const name = document.getElementById('playerName').value.trim() || `Warrior_${Math.floor(Math.random()*1000)}`;
      if (code && ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'join_room', roomCode: code, playerName: name }));
        joinModal.style.display = 'none';
      } else { statusDiv.textContent = '❌ Invalid code or not connected!'; }
    };
    
    document.getElementById('cancelJoin').onclick = () => {
      joinModal.style.display = 'none';
    };
    
    readyBtn.onclick = () => {
      if (ws && currentRoom && !isReady) {
        isReady = true;
        ws.send(JSON.stringify({ type: 'player_ready' }));
        readyBtn.disabled = true;
        readyBtn.textContent = '✅ Ready!';
      }
    };
    
    leaveBtn.onclick = () => {
      if (ws && currentRoom) {
        ws.send(JSON.stringify({ type: 'leave_room' }));
        gamePanel.style.display = 'none';
        currentRoom = null;
        gameStarted = false;
        isReady = false;
        readyBtn.disabled = false;
        readyBtn.textContent = '✅ Ready';
        localPlayer.position.set(0, -0.5, 0);
        otherPlayers.forEach(p => scene.remove(p));
        otherPlayers.clear();
      }
    };
    
    // How to Play মডাল
    const modal = document.getElementById('howToPlayModal');
    document.getElementById('howToPlayBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('closeModalBtn').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    
    // অ্যানিমেশন
    function animate() {
      requestAnimationFrame(animate);
      handleMovement();
      updateCamera();
      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    connectWebSocket();
    console.log('Game started!');
  </script>
</body>
</html>
