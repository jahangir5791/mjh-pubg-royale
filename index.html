<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MJH রাজ্যের যুদ্ধ - 3D কৌশলগত সাম্রাজ্য</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif; background: #0a0f1e; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .ui-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .top-bar { position: fixed; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; pointer-events: auto; z-index: 1100; gap: 15px; flex-wrap: wrap; }
        .resources-panel { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(12px); border-radius: 60px; padding: 8px 20px; display: flex; gap: 25px; border: 1px solid rgba(255, 215, 0, 0.3); }
        .resource { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 16px; color: #ffd966; }
        .kingdom-info { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); border-radius: 40px; padding: 5px 20px; display: flex; align-items: center; gap: 20px; border: 1px solid #aa8c54; }
        .action-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(16px); border-radius: 80px; padding: 10px 20px; display: flex; gap: 20px; pointer-events: auto; border: 1px solid rgba(255, 215, 0, 0.4); z-index: 1100; flex-wrap: wrap; justify-content: center; }
        .btn { background: linear-gradient(135deg, #2c2c2c, #1a1a1a); border: none; padding: 12px 24px; border-radius: 50px; font-weight: bold; color: #ffefb9; cursor: pointer; transition: 0.2s; font-size: 16px; border-bottom: 2px solid #aa8c54; }
        .btn-primary { background: linear-gradient(135deg, #3a2a1a, #2a1a0a); border-bottom-color: #ffaa33; color: #ffd966; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .right-panel { position: fixed; bottom: 120px; right: 20px; width: 280px; background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(16px); border-radius: 20px; border: 1px solid #aa8c54; pointer-events: auto; z-index: 1100; padding: 12px; }
        .panel-header { display: flex; justify-content: space-between; border-bottom: 1px solid #ffd96650; padding-bottom: 6px; margin-bottom: 8px; color: #ffd966; font-weight: bold; }
        .chat-log { height: 150px; overflow-y: auto; font-size: 12px; margin-bottom: 8px; color: #ddd; }
        .chat-input { display: flex; gap: 5px; }
        .chat-input input { flex: 1; background: #00000066; border: 1px solid #aa8c54; border-radius: 30px; padding: 5px 10px; color: white; }
        .toast-notify { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border-radius: 60px; padding: 10px 24px; color: #ffd966; font-weight: bold; z-index: 1200; white-space: nowrap; border-left: 4px solid #ffaa33; display: none; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); border-radius: 32px; padding: 20px; min-width: 320px; z-index: 2000; border: 2px solid #ffd966; display: none; flex-direction: column; gap: 12px; pointer-events: auto; max-height: 80vh; overflow-y: auto; }
        .hero-card { background: #1e1a10; border-radius: 20px; padding: 12px; display: flex; gap: 15px; align-items: center; border: 1px solid #aa8c54; }
        .close-modal { background: #aa3333; border: none; padding: 6px; border-radius: 40px; cursor: pointer; color:white; }
        @media (max-width: 800px) { .btn { padding: 6px 14px; font-size: 12px; } .right-panel { width: 240px; } }
    </style>
</head>
<body>
<div class="ui-container">
    <div class="top-bar">
        <div class="resources-panel">
            <div class="resource"><span>💰</span> <span id="goldAmount">5000</span></div>
            <div class="resource"><span>🪵</span> <span id="woodAmount">3000</span></div>
            <div class="resource"><span>🪨</span> <span id="stoneAmount">2500</span></div>
            <div class="resource"><span>👥</span> <span id="troopCount">120</span></div>
        </div>
        <div class="kingdom-info">
            <span class="kingdom-name">🏰 এমজেএইচ রাজ্য</span>
            <span>🏆 লেভেল <span id="kingdomLevel">3</span></span>
            <span>⚔️ শক্তি: <span id="totalPower">12500</span></span>
        </div>
    </div>
    <div class="action-bar">
        <button class="btn btn-primary" id="buildFarmBtn">🌾 খামার বানাও</button>
        <button class="btn btn-primary" id="recruitBtn">⚔️ সৈন্য নিয়োগ</button>
        <button class="btn btn-primary" id="heroesBtn">📜 বীরগণ</button>
        <button class="btn" id="allianceBtn">🤝 জোট</button>
        <button class="btn" id="worldMapBtn">🗺️ বিশ্ব মানচিত্র</button>
    </div>
    <div class="right-panel">
        <div class="panel-header"><span>🤝 ড্রাগন জোট</span><span>👥 ৪/২০</span></div>
        <div class="chat-log" id="chatLog"><div>🛡️ স্বাগতম, মহারাজ!</div><div>📢 জোট: রাজ্য রক্ষা করো!</div></div>
        <div class="chat-input"><input type="text" id="chatMessage" placeholder="জোটে বার্তা..."><button id="sendChatBtn" style="background:#aa8c54; border:none; border-radius:30px; padding:0 12px;">📨</button></div>
    </div>
</div>
<div id="heroModal" class="modal"><h3 style="color:#ffd966;">📜 কিংবদন্তি বীরগণ</h3><div id="heroList"></div><button class="close-modal" id="closeHeroModal">বন্ধ করুন</button></div>
<div id="notificationToast" class="toast-notify"></div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }</script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

    // ---------- রাজ্যের তথ্য ----------
    let resources = { gold: 5000, wood: 3000, stone: 2500, troops: 120 };
    let kingdomLevel = 3, totalPower = 12500;
    let buildings = [];
    let heroes = [
        { id: 1, name: "আর্থার রাজা", attack: 85, defense: 70, owned: false, cost: 800 },
        { id: 2, name: "জুলিয়াস সিজার", attack: 90, defense: 65, owned: false, cost: 850 },
        { id: 3, name: "চেঙ্গিস খান", attack: 95, defense: 60, owned: false, cost: 1000 }
    ];
    
    // ---------- থ্রিডি দৃশ্য ----------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a2a3a);
    scene.fog = new THREE.FogExp2(0x1a2a3a, 0.003);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(15, 12, 20);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.05; controls.zoomSpeed = 1.2; controls.panSpeed = 0.8; controls.target.set(0, 2, 0);
    
    // ভূখণ্ড
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a6a3a, roughness: 0.8 });
    const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), groundMat);
    groundPlane.rotation.x = -Math.PI/2; groundPlane.position.y = -1; groundPlane.receiveShadow = true;
    scene.add(groundPlane);
    const gridHelper = new THREE.GridHelper(40, 20, 0xccaa66, 0x886633);
    gridHelper.position.y = -0.9;
    scene.add(gridHelper);
    
    // আলো
    const ambientLight = new THREE.AmbientLight(0x555555);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xfff5e0, 1);
    dirLight.position.set(10, 20, 5);
    dirLight.castShadow = true;
    scene.add(dirLight);
    
    // দুর্গ
    const castleBase = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2.5, 2.2), new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.4 }));
    castleBase.position.set(0, 0.2, 0); castleBase.castShadow = true;
    scene.add(castleBase);
    const roofTop = new THREE.Mesh(new THREE.ConeGeometry(1.5, 1.2, 4), new THREE.MeshStandardMaterial({ color: 0xaa6644 }));
    roofTop.position.set(0, 1.5, 0);
    castleBase.add(roofTop);
    
    function addBuildingVisual(x, z) {
        const building = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.8, 1.4), new THREE.MeshStandardMaterial({ color: 0x88aa66 }));
        building.position.set(x, -0.5 + 0.4, z);
        building.castShadow = true;
        scene.add(building);
        buildings.push({ mesh: building, type: 'farm', x, z });
    }
    addBuildingVisual(2.5, 2.2); addBuildingVisual(-2.3, 2.0); addBuildingVisual(2.0, -2.5); addBuildingVisual(-2.5, -2.0);
    
    // গাছ
    for (let i = 0; i < 120; i++) {
        const tree = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 0.7, 5), new THREE.MeshStandardMaterial({ color: 0x8B5A2B }));
        trunk.position.y = 0.35;
        const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.7, 5), new THREE.MeshStandardMaterial({ color: 0x5c9e3e }));
        foliage.position.y = 0.75;
        tree.add(trunk, foliage);
        const angle = Math.random() * Math.PI * 2, radius = 12 + Math.random() * 16;
        tree.position.x = Math.cos(angle) * radius; tree.position.z = Math.sin(angle) * radius;
        scene.add(tree);
    }
    
    // UI ফাংশন
    function updateUI() {
        document.getElementById('goldAmount').innerText = Math.floor(resources.gold);
        document.getElementById('woodAmount').innerText = resources.wood;
        document.getElementById('stoneAmount').innerText = resources.stone;
        document.getElementById('troopCount').innerText = resources.troops;
        document.getElementById('kingdomLevel').innerText = kingdomLevel;
        document.getElementById('totalPower').innerText = totalPower;
    }
    function showNotification(msg, isError = false) {
        const toast = document.getElementById('notificationToast');
        toast.style.display = 'block';
        toast.style.color = isError ? '#ffaa88' : '#ffd966';
        toast.innerText = msg;
        setTimeout(() => toast.style.display = 'none', 2500);
    }
    function buildFarm() {
        if (resources.wood >= 300 && resources.stone >= 200) {
            resources.wood -= 300; resources.stone -= 200; totalPower += 180;
            showNotification("🌾 খামার নির্মিত! সম্পদ উৎপাদন বেড়েছে।");
            updateUI();
            addBuildingVisual((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8);
        } else showNotification("প্রয়োজন ৩০০ কাঠ ও ২০০ পাথর!", true);
    }
    function recruitTroops() {
        if (resources.gold >= 400) {
            resources.gold -= 400; resources.troops += 50; totalPower += 350;
            updateUI();
            showNotification("⚔️ ৫০ সৈন্য নিয়োগ দেয়া হলো!");
        } else showNotification("সোনার অভাব!", true);
    }
    function openHeroModal() {
        const container = document.getElementById('heroList');
        container.innerHTML = '';
        heroes.forEach(h => {
            const card = document.createElement('div');
            card.className = 'hero-card';
            card.innerHTML = `<div>✨ <strong>${h.name}</strong><br>⚔️ আক্রমণ ${h.attack} 🛡️ প্রতিরোধ ${h.defense}</div>
                <div style="margin-left:auto;">💰 ${h.cost} সোনা</div>
                <button class="btn" data-id="${h.id}" style="background:#3a2a1a; padding:4px 12px;">${h.owned ? 'আয়ত্ত' : 'নিয়োগ'}</button>`;
            container.appendChild(card);
            const btn = card.querySelector('button');
            if (!h.owned) btn.addEventListener('click', () => recruitHero(h.id));
            else btn.disabled = true;
        });
        document.getElementById('heroModal').style.display = 'flex';
    }
    function recruitHero(id) {
        const hero = heroes.find(h => h.id === id);
        if (hero && !hero.owned && resources.gold >= hero.cost) {
            resources.gold -= hero.cost; hero.owned = true; totalPower += hero.attack * 5;
            updateUI();
            showNotification(`${hero.name} আপনার সেনাবাহিনীতে যোগ দিয়েছেন!`);
            openHeroModal();
        } else showNotification("সোনা কম!", true);
    }
    function sendAllianceChat() {
        const input = document.getElementById('chatMessage');
        const msg = input.value.trim();
        if (!msg) return;
        const chatDiv = document.getElementById('chatLog');
        const newMsg = document.createElement('div');
        newMsg.innerText = `👑 রাজা MJH: ${msg}`;
        chatDiv.appendChild(newMsg);
        chatDiv.scrollTop = chatDiv.scrollHeight;
        input.value = '';
        setTimeout(() => {
            const resp = document.createElement('div');
            resp.innerText = `🤝 স্যার ল্যান্সলট: জয় হোক মহারাজ!`;
            chatDiv.appendChild(resp);
        }, 800);
    }
    function openWorldMap() {
        showNotification("🗺️ বিশ্ব মানচিত্র: শীঘ্রই অঞ্চল সম্প্রসারণ ও প্লেয়ার যুদ্ধ আসছে!");
        camera.position.set(25, 18, 28);
        controls.target.set(5, 0, 5);
        setTimeout(() => { camera.position.set(15, 12, 20); controls.target.set(0, 0, 0); }, 2000);
    }
    
    // প্যাসিভ ইনকাম
    setInterval(() => {
        let goldGain = 80 + buildings.length * 12 + Math.floor(resources.troops / 40);
        resources.gold += goldGain;
        resources.wood += 40 + buildings.filter(b => b.type === 'farm').length * 18;
        updateUI();
    }, 8000);
    setInterval(() => { if (Math.random() > 0.65) showNotification("⚡ শত্রু গুপ্তচর ধরা পড়েছে!"); }, 25000);
    
    // বাটন ইভেন্ট
    document.getElementById('buildFarmBtn').addEventListener('click', buildFarm);
    document.getElementById('recruitBtn').addEventListener('click', recruitTroops);
    document.getElementById('heroesBtn').addEventListener('click', openHeroModal);
    document.getElementById('allianceBtn').addEventListener('click', () => showNotification("জোটের শক্তি বাড়ানোর জন্য সদস্য সংগ্রহ করুন!"));
    document.getElementById('worldMapBtn').addEventListener('click', openWorldMap);
    document.getElementById('sendChatBtn').addEventListener('click', sendAllianceChat);
    document.getElementById('chatMessage').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendAllianceChat(); });
    document.getElementById('closeHeroModal').addEventListener('click', () => document.getElementById('heroModal').style.display = 'none');
    
    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    updateUI();
    console.log("🔥 MJH রাজ্যের যুদ্ধ - সম্পূর্ণ 3D কৌশলগত গেম লোড হয়েছে (বাংলা)");
</script>
</body>
</html>
