<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJH PUBG Royale - Multiplayer Battle Royale PWA Game</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Theme color for PWA -->
    <meta name="theme-color" content="#1a1a2e">
    <meta name="background-color" content="#16213e">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered', reg))
                    .catch(err => console.log('SW registration failed', err));
            });
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.5em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 8px 25px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255,107,107,0.6);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            box-shadow: 0 8px 25px rgba(78,205,196,0.4);
        }

        .btn-secondary:hover {
            box-shadow: 0 12px 35px rgba(78,205,196,0.6);
        }

        .status {
            margin-top: 30px;
            font-size: 1.1em;
            opacity: 0.8;
        }

        .loading {
            display: none;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .offline {
            background: rgba(255,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2em; }
            .btn { padding: 12px 30px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 MJH PUBG Royale</h1>
        <p class="subtitle">Multiplayer Battle Royale PWA Game</p>
        
        <button class="btn" onclick="startGame()">🚀 Quick Play</button>
        <button class="btn btn-secondary" onclick="createRoom()">🏠 Create Room</button>
        <button class="btn btn-secondary" onclick="joinRoom()">👥 Join Room</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Connecting to server...</p>
        </div>
        
        <div class="status" id="status">Ready to battle! 💥</div>
    </div>

    <script>
        // Check offline status
        window.addEventListener('online', () => {
            document.getElementById('status').textContent = 'Online - Ready to play!';
            document.querySelector('.offline')?.remove();
        });

        window.addEventListener('offline', () => {
            document.getElementById('status').innerHTML = 'Offline mode <br><small>Game will load when online</small>';
        });

        // Game functions (placeholders)
        function startGame() {
            showLoading();
            // TODO: Connect to WebSocket server
            setTimeout(() => {
                hideLoading();
                alert('🎮 Game starting! (Demo mode)

Coming soon: Real multiplayer battle royale');
            }, 2000);
        }

        function createRoom() {
            showLoading();
            // TODO: Create room via API
            setTimeout(() => {
                hideLoading();
                alert('Room created! Share this code: ABC123');
            }, 1500);
        }

        function joinRoom() {
            const code = prompt('Enter room code:');
            if (code) {
                showLoading();
                // TODO: Join room via API
                setTimeout(() => {
                    hideLoading();
                    alert(`Joined room ${code}! Waiting for players...`);
                }, 1500);
            }
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // PWA Install Prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        // Show install button if applicable
        document.querySelector('.btn-secondary').addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                });
            }
        });
    </script>
</body>
</html>
