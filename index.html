<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MJH PUBG Royale - Real 3D Multiplayer Battle Royale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Arial', sans-serif; }
    
    /* UI ওভারলে */
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      z-index: 100;
      pointer-events: none;
    }
    
    .panel {
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
      pointer-events: auto;
      border: 1px solid rgba(0,255,255,0.3);
      max-width: 350px;
    }
    
    h1 {
      color: #ff6b6b;
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    button {
      background: linear-gradient(45deg, #ff6b6b, #feca57);
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    button:hover { transform: scale(1.05); }
    button:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
    
    input {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      width: 200px;
    }
    
    input::placeholder { color: rgba(255,255,255,0.6); }
    
    #status {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      font-family: monospace;
      z-index: 100;
      font-size: 12px;
    }
    
    .room-code {
      background: #ff6b6b;
      padding: 5px 10px;
      border-radius: 10px;
      font-weight: bold;
      display: inline-block;
      margin: 5px;
    }
    
    .players-list {
      margin-top: 10px;
      font-size: 12px;
      max-height: 150px;
      overflow-y: auto;
    }
    
    .player-item {
      padding: 3px;
      margin: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 5px;
    }
    
    .hidden { display: none; }
    
    #gameStatus {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
      color: #ffaa00;
    }
    
    .connected { color: #0f0; }
    .disconnected { color: #f00; }
    .connecting { color: #ff0; }
    
    @media (max-width: 600px) {
      .panel { max-width: 280px; padding: 15px; }
      button { padding: 8px 16px; font-size: 12px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="panel" id="lobbyPanel">
      <h1>🏆 MJH PUBG Royale</h1>
      <button id="quickPlayBtn">🎮 Quick Play</button>
      <button id="createRoomBtn">🏠 Create Room</button>
      <button id="joinRoomBtn">👥 Join Room</button>
      
      <div id="joinInput" class="hidden">
        <input type="text" id="roomCode" placeholder="Room Code (MJHXXXX)">
        <input type="text" id="playerName" placeholder="Your Name">
        <button id="confirmJoin">Join</button>
        <button id="cancelJoin">Cancel</button>
      </div>
    </div>
    
    <div class="panel hidden" id="gamePanel">
      <div>Room: <span id="roomCodeDisplay" class="room-code"></span></div>
      <div>Players: <span id="playerCount"></span>/4</div>
      <div class="players-list" id="playersList"></div>
      <button id="readyBtn">✅ Ready</button>
      <button id="leaveBtn">🚪 Leave Room</button>
      <div id="gameStatus"></div>
    </div>
  </div>
  <div id="status">🔌 Connecting to Render server...</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    
    let ws = null;
    let playerId = null;
    let currentRoom = null;
    let isReady = false;
    let gameStarted = false;
    let reconnectAttempts = 0;
    const maxReconnectAttempts = 5;
    
    // 3D সেটআপ
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050b1a);
    scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    
    // গ্রাউন্ড
    const groundGeometry = new THREE.PlaneGeometry(50, 50);
    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2c5f2d, roughness: 0.8, metalness: 0.2 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // গ্রিড হেল্পার
    const gridHelper = new THREE.GridHelper(50, 20, 0x4ecdc4, 0x2c5f2d);
    gridHelper.position.y = -0.9;
    scene.add(gridHelper);
    
    // লাইটিং
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(10, 20, 5);
    directionalLight.castShadow = true;
    scene.add(directionalLight);
    const backLight = new THREE.PointLight(0x4466ff, 0.5);
    backLight.position.set(0, 5, -5);
    scene.add(backLight);
    
    // প্লেয়ার অবজেক্ট
    let localPlayerMesh = null;
    const otherPlayers = new Map();
    
    function createPlayerMesh(color = 0xff6b6b, isLocal = false) {
      const group = new THREE.Group();
      
      const bodyGeo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
      const bodyMat = new THREE.MeshStandardMaterial({ color: color, emissive: isLocal ? 0x442200 : 0x000000 });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.6;
      body.castShadow = true;
      group.add(body);
      
      const headGeo = new THREE.SphereGeometry(0.5, 32, 32);
      const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.y = 1.2;
      head.castShadow = true;
      group.add(head);
      
      const helmetGeo = new THREE.CylinderGeometry(0.55, 0.6, 0.3, 8);
      const helmetMat = new THREE.MeshStandardMaterial({ color: 0xcc8844, metalness: 0.7 });
      const helmet = new THREE.Mesh(helmetGeo, helmetMat);
      helmet.position.y = 1.45;
      group.add(helmet);
      
      return group;
    }
    
    localPlayerMesh = createPlayerMesh(0xff6b6b, true);
    scene.add(localPlayerMesh);
    
    function updateCamera() {
      if (localPlayerMesh && gameStarted) {
        const targetPos = localPlayerMesh.position.clone();
        camera.position.lerp(targetPos.clone().add(new THREE.Vector3(0, 3, 8)), 0.1);
        camera.lookAt(targetPos);
      }
    }
    
    // কীবোর্ড কন্ট্রোল
    const keyState = {};
    window.addEventListener('keydown', (e) => {
      keyState[e.key.toLowerCase()] = true;
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', (e) => { keyState[e.key.toLowerCase()] = false; });
    
    let lastSentPosition = { x: 0, z: 0 };
    function handleMovement() {
      if (!gameStarted || !localPlayerMesh) return;
      
      let moveX = 0, moveZ = 0;
      if (keyState['w'] || keyState['arrowup']) moveZ -= 0.15;
      if (keyState['s'] || keyState['arrowdown']) moveZ += 0.15;
      if (keyState['a'] || keyState['arrowleft']) moveX -= 0.15;
      if (keyState['d'] || keyState['arrowright']) moveX += 0.15;
      
      if (moveX !== 0 || moveZ !== 0) {
        const newPos = localPlayerMesh.position.clone();
        newPos.x += moveX;
        newPos.z += moveZ;
        newPos.x = Math.max(-22, Math.min(22, newPos.x));
        newPos.z = Math.max(-22, Math.min(22, newPos.z));
        localPlayerMesh.position.copy(newPos);
        
        const angle = Math.atan2(moveX, moveZ);
        localPlayerMesh.rotation.y = angle;
        
        if (ws && ws.readyState === WebSocket.OPEN) {
          const pos = { x: localPlayerMesh.position.x, y: 0, z: localPlayerMesh.position.z };
          if (Math.hypot(pos.x - lastSentPosition.x, pos.z - lastSentPosition.z) > 0.5) {
            ws.send(JSON.stringify({ type: 'update_position', position: pos }));
            lastSentPosition = { x: pos.x, z: pos.z };
          }
        }
      }
    }
    
    // UI এলিমেন্ট
    const lobbyPanel = document.getElementById('lobbyPanel');
    const gamePanel = document.getElementById('gamePanel');
    const statusDiv = document.getElementById('status');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const playersListDiv = document.getElementById('playersList');
    const playerCountSpan = document.getElementById('playerCount');
    const readyBtn = document.getElementById('readyBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const gameStatusDiv = document.getElementById('gameStatus');
    
    // ============= গুরুত্বপূর্ণ: Render সার্ভারে WebSocket সংযোগ =============
    function connectWebSocket() {
      // সরাসরি Render সার্ভারের URL ব্যবহার করুন
      const wsUrl = 'wss://mjh-pubg-server.onrender.com';
      
      console.log('🔌 Connecting to Render WebSocket:', wsUrl);
      statusDiv.textContent = '🔌 Connecting to Render server (mjh-pubg-server.onrender.com)...';
      statusDiv.className = 'connecting';
      
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        console.log('✅ Connected to Render WebSocket server!');
        statusDiv.textContent = '✅ Connected to Render server! Ready to battle!';
        statusDiv.className = 'connected';
        reconnectAttempts = 0;
      };
      
      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          console.log('📨 Message from server:', data.type);
          handleServerMessage(data);
        } catch (err) {
          console.error('Parse error:', err);
        }
      };
      
      ws.onerror = (error) => {
        console.error('❌ WebSocket error:', error);
        statusDiv.textContent = '❌ Connection error! Render server might be waking up. Please wait 30 seconds and refresh.';
        statusDiv.className = 'disconnected';
      };
      
      ws.onclose = () => {
        console.log('🔌 WebSocket disconnected');
        statusDiv.textContent = '🔌 Disconnected from Render server. The free tier spins down with inactivity. Reconnecting...';
        statusDiv.className = 'disconnected';
        
        if (reconnectAttempts < maxReconnectAttempts) {
          reconnectAttempts++;
          const delay = 5000;
          console.log(`Reconnect attempt ${reconnectAttempts}/${maxReconnectAttempts} in ${delay/1000}s...`);
          setTimeout(() => {
            if (!ws || ws.readyState === WebSocket.CLOSED) {
              connectWebSocket();
            }
          }, delay);
        }
      };
    }
    
    function handleServerMessage(data) {
      switch(data.type) {
        case 'connected':
          playerId = data.playerId;
          console.log('🎮 Player ID:', playerId);
          statusDiv.textContent = `✅ Connected to Render! ID: ${playerId.slice(0,8)}`;
          break;
          
        case 'room_created':
          currentRoom = data.roomCode;
          roomCodeDisplay.textContent = data.roomCode;
          updatePlayersList(data.players);
          lobbyPanel.classList.add('hidden');
          gamePanel.classList.remove('hidden');
          statusDiv.textContent = `🎯 Room created: ${data.roomCode}`;
          gameStatusDiv.textContent = 'Share this code with friends! Click READY when ready.';
          console.log('🏠 Room created:', data.roomCode);
          break;
          
        case 'room_joined':
          currentRoom = data.roomCode;
          roomCodeDisplay.textContent = data.roomCode;
          updatePlayersList(data.players);
          lobbyPanel.classList.add('hidden');
          gamePanel.classList.remove('hidden');
          statusDiv.textContent = `🎯 Joined room ${data.roomCode}`;
          gameStatusDiv.textContent = 'Click READY when ready!';
          console.log('👥 Joined room:', data.roomCode);
          break;
          
        case 'player_joined':
        case 'player_left':
        case 'player_ready_update':
          if (currentRoom && data.players) {
            updatePlayersList(data.players);
            if (data.allReady) {
              gameStatusDiv.textContent = '🎮 All players ready! Game starting...';
            }
          }
          break;
          
        case 'game_start':
          gameStarted = true;
          gameStatusDiv.textContent = '🎬 GAME STARTED! Move with WASD/Arrows';
          statusDiv.textContent = '🔫 Battle Royale Mode Active!';
          localPlayerMesh.position.set(
            (Math.random() - 0.5) * 30, 0, (Math.random() - 0.5) * 30
          );
          console.log('🎮 Game started!');
          break;
          
        case 'player_moved':
          if (data.playerId !== playerId && data.position) {
            let otherMesh = otherPlayers.get(data.playerId);
            if (!otherMesh) {
              otherMesh = createPlayerMesh(0x4ecdc4, false);
              scene.add(otherMesh);
              otherPlayers.set(data.playerId, otherMesh);
              console.log('➕ Added other player:', data.playerId);
            }
            if (otherMesh) {
              otherMesh.position.set(data.position.x, data.position.y, data.position.z);
            }
          }
          break;
          
        case 'error':
          console.error('Server error:', data.message);
          statusDiv.textContent = `⚠️ ${data.message}`;
          setTimeout(() => {
            if (statusDiv.textContent.includes(data.message)) {
              statusDiv.className = 'connected';
            }
          }, 3000);
          break;
      }
    }
    
    function updatePlayersList(players) {
      if (!players) return;
      playerCountSpan.textContent = players.length;
      playersListDiv.innerHTML = players.map(p => 
        `<div class="player-item">${p.name} ${p.isHost ? '👑' : ''} ${p.ready ? '✅' : '⏳'}</div>`
      ).join('');
    }
    
    // বাটন ইভেন্ট
    document.getElementById('quickPlayBtn').onclick = () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'quick_play' }));
        statusDiv.textContent = '🔍 Searching for match on Render server...';
        console.log('Quick Play clicked');
      } else {
        statusDiv.textContent = '❌ Not connected to Render server! Reconnecting...';
        statusDiv.className = 'disconnected';
        connectWebSocket();
      }
    };
    
    document.getElementById('createRoomBtn').onclick = () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'create_room', roomName: 'MJH Battle' }));
        statusDiv.textContent = '🏠 Creating room on Render server...';
        console.log('Create Room clicked');
      } else {
        statusDiv.textContent = '❌ Not connected to Render server! Reconnecting...';
        statusDiv.className = 'disconnected';
        connectWebSocket();
      }
    };
    
    document.getElementById('joinRoomBtn').onclick = () => {
      document.getElementById('joinInput').classList.toggle('hidden');
    };
    
    document.getElementById('confirmJoin').onclick = () => {
      const code = document.getElementById('roomCode').value.trim().toUpperCase();
      const name = document.getElementById('playerName').value.trim() || `Warrior_${Math.floor(Math.random()*1000)}`;
      if (code && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'join_room', roomCode: code, playerName: name }));
        document.getElementById('joinInput').classList.add('hidden');
        document.getElementById('roomCode').value = '';
        document.getElementById('playerName').value = '';
        statusDiv.textContent = `🔍 Joining room ${code}...`;
        console.log('Join Room:', code, name);
      } else if (!code) {
        statusDiv.textContent = '⚠️ Please enter a room code!';
      } else {
        statusDiv.textContent = '❌ Not connected to Render server!';
      }
    };
    
    document.getElementById('cancelJoin').onclick = () => {
      document.getElementById('joinInput').classList.add('hidden');
      document.getElementById('roomCode').value = '';
      document.getElementById('playerName').value = '';
    };
    
    readyBtn.onclick = () => {
      if (ws && currentRoom && !isReady && ws.readyState === WebSocket.OPEN) {
        isReady = true;
        ws.send(JSON.stringify({ type: 'player_ready' }));
        readyBtn.disabled = true;
        readyBtn.textContent = '✅ Ready!';
        gameStatusDiv.textContent = 'Waiting for other players...';
        console.log('Player ready');
      }
    };
    
    leaveBtn.onclick = () => {
      if (ws && currentRoom && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'leave_room' }));
        lobbyPanel.classList.remove('hidden');
        gamePanel.classList.add('hidden');
        currentRoom = null;
        gameStarted = false;
        isReady = false;
        gameStatusDiv.textContent = '';
        readyBtn.disabled = false;
        readyBtn.textContent = '✅ Ready';
        localPlayerMesh.position.set(0, 0, 0);
        
        otherPlayers.forEach((mesh, id) => {
          scene.remove(mesh);
          otherPlayers.delete(id);
        });
        console.log('Left room');
      }
    };
    
    // অ্যানিমেশন লুপ
    function animate() {
      requestAnimationFrame(animate);
      handleMovement();
      updateCamera();
      renderer.render(scene, camera);
    }
    animate();
    
    // গাছ যোগ করা
    for (let i = 0; i < 50; i++) {
      const treeGroup = new THREE.Group();
      const trunkGeo = new THREE.CylinderGeometry(0.4, 0.5, 1.2);
      const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.y = 0.6;
      treeGroup.add(trunk);
      
      const foliageGeo = new THREE.ConeGeometry(0.7, 1, 8);
      const foliageMat = new THREE.MeshStandardMaterial({ color: 0x3a7d34 });
      const foliage = new THREE.Mesh(foliageGeo, foliageMat);
      foliage.position.y = 1.2;
      treeGroup.add(foliage);
      
      const angle = Math.random() * Math.PI * 2;
      const radius = 15 + Math.random() * 20;
      treeGroup.position.x = Math.cos(angle) * radius;
      treeGroup.position.z = Math.sin(angle) * radius;
      scene.add(treeGroup);
    }
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // শুরু করুন - Render সার্ভারে সংযোগ
    console.log('🎮 MJH PUBG Royale - Starting...');
    console.log('💡 Connecting to Render WebSocket: wss://mjh-pubg-server.onrender.com');
    connectWebSocket();
  </script>
</body>
</html>
